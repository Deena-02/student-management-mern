name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js (Backend)
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install Dependencies (Backend)
      run: |
        cd backend
        npm install

    - name: Install Dependencies & Build (Frontend)
      run: |
        cd frontend
        npm install
        npm run build
